name: Build Resume (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Build resume
        run: uv run resume-markdown build

      - name: Upload PDF artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: resume-pr-${{ github.event.pull_request.number }}
          path: resume.pdf

      - name: Comment with artifact URL
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- resume-pdf-bot -->';
            const body = [
              marker,
              '### Resume Preview',
              '',
              `Build from commit \`${context.sha.slice(0, 7)}\``,
              '',
              `[:page_facing_up: Download PDF](${{ steps.upload.outputs.artifact-url }})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
